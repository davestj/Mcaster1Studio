<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="55%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#6b2f0a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#4a2106" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Open book shape -->
  <path d="M16,10 L8,8 L8,22 L16,24 L24,22 L24,8 Z" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <line x1="16" y1="10" x2="16" y2="24" stroke="#fff" stroke-width="1.0"/>
  <!-- Text lines on left page -->
  <line x1="10" y1="12" x2="14.5" y2="13" stroke="#fff" stroke-width="0.7" opacity="0.7"/>
  <line x1="10" y1="15" x2="14.5" y2="16" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="10" y1="18" x2="14.5" y2="19" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <!-- Text lines on right page -->
  <line x1="17.5" y1="13" x2="22" y2="12" stroke="#fff" stroke-width="0.7" opacity="0.7"/>
  <line x1="17.5" y1="16" x2="22" y2="15" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="17.5" y1="19" x2="22" y2="18" stroke="#fff" stroke-width="0.7" opacity="0.5"/>
  <!-- Cross bookmark -->
  <line x1="16" y1="6" x2="16" y2="10" stroke="#fff" stroke-width="1.2"/>
  <line x1="14" y1="7.5" x2="18" y2="7.5" stroke="#fff" stroke-width="1.0"/>
</svg>
