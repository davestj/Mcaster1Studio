<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#4c1d95" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Canvas/frame -->
  <rect x="6" y="7" width="20" height="14" rx="1.5" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <!-- Text lines representing template -->
  <line x1="9" y1="11" x2="23" y2="11" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="11" y1="14" x2="21" y2="14" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
  <line x1="12" y1="17" x2="20" y2="17" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Paint brush/palette indicator -->
  <circle cx="22" cy="24" r="3.5" fill="none" stroke="#fff" stroke-width="1.0" filter="url(#ico)"/>
  <circle cx="21" cy="23.5" r="0.8" fill="#fff"/>
  <circle cx="23" cy="23.5" r="0.8" fill="#fff"/>
  <circle cx="22" cy="25.5" r="0.8" fill="#fff"/>
</svg>
