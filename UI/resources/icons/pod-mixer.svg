<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#1e3a8a" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- 3 vertical fader lines with slider knobs -->
  <g filter="url(#ico)">
    <line x1="11" y1="10" x2="11" y2="24" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
    <rect x="8.5" y="14" width="5" height="2.5" rx="1" fill="#fff"/>
    <line x1="16" y1="10" x2="16" y2="24" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
    <rect x="13.5" y="17" width="5" height="2.5" rx="1" fill="#fff"/>
    <line x1="21" y1="10" x2="21" y2="24" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
    <rect x="18.5" y="12" width="5" height="2.5" rx="1" fill="#fff"/>
  </g>
</svg>
