<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="55%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#7f1d1d" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Record dot with audio track lines -->
  <g filter="url(#ico)">
    <circle cx="14" cy="16" r="4.5" fill="#fff"/>
    <line x1="20" y1="13.5" x2="25" y2="13.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="16" x2="25" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="18.5" x2="25" y2="18.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
