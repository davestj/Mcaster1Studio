<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.12"/></filter>
  </defs>
  <rect x="1" y="1" width="22" height="22" rx="4" fill="#e8e4de" stroke="#c0b8ae" stroke-width="0.5" filter="url(#sh)"/>
  <!-- Stacked vinyl discs (isometric view) -->
  <ellipse cx="12" cy="16" rx="6.5" ry="2.2" fill="#d8d0c5" stroke="#96897c" stroke-width="0.7"/>
  <ellipse cx="12" cy="14" rx="6.5" ry="2.2" fill="#ddd8d0" stroke="#96897c" stroke-width="0.7"/>
  <ellipse cx="12" cy="12" rx="6.5" ry="2.2" fill="#e8e4de" stroke="#96897c" stroke-width="0.7"/>
  <circle cx="12" cy="12" r="1.3" fill="#1e3a5f"/>
  <!-- List lines above discs -->
  <line x1="6.5" y1="9"   x2="17.5" y2="9"   stroke="#6b6560" stroke-width="0.8" opacity="0.7"/>
  <line x1="6.5" y1="7.2" x2="14"   y2="7.2" stroke="#6b6560" stroke-width="0.8" opacity="0.5"/>
</svg>
