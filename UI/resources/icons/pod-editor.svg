<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#99f6e4"/>
      <stop offset="55%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#134e4a" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Waveform with scissors -->
  <g filter="url(#ico)">
    <path d="M6 17 Q8 12 10 17 Q12 22 14 17"
          fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M18 17 Q20 12 22 17 Q24 22 26 17"
          fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Scissors -->
    <circle cx="15" cy="12" r="1.8" fill="none" stroke="#fff" stroke-width="1.2"/>
    <circle cx="17" cy="12" r="1.8" fill="none" stroke="#fff" stroke-width="1.2"/>
    <line x1="13.5" y1="13.2" x2="16" y2="17" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="18.5" y1="13.2" x2="16" y2="17" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
