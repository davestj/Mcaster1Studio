<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="55%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#166534" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Heart shape -->
  <path d="M16 24 C12 20, 7 16, 7 12.5 C7 10, 9 8, 11.5 8 C13.5 8, 15 9.5, 16 11
           C17 9.5, 18.5 8, 20.5 8 C23 8, 25 10, 25 12.5 C25 16, 20 20, 16 24Z"
        fill="#fff" filter="url(#ico)"/>
  <!-- Pulse line over heart -->
  <polyline points="10,14 13,14 14,11 16,17 18,13 19,14 22,14"
            fill="none" stroke="#15803d" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
