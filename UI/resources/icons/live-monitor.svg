<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="55%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#075985" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Monitor screen -->
  <rect x="7" y="8" width="18" height="12" rx="1.5" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <!-- Signal line (heartbeat/chart) -->
  <polyline points="9,16 12,16 13,12 15,19 17,14 19,16 21,16 23,13"
            fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" filter="url(#ico)"/>
  <!-- Monitor stand -->
  <line x1="16" y1="20" x2="16" y2="23" stroke="#fff" stroke-width="1.2"/>
  <line x1="12" y1="23" x2="20" y2="23" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
