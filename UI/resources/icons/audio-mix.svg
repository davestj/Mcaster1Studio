<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#92400e" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Mixer faders -->
  <rect x="8" y="10" width="2" height="14" rx="1" fill="#fff" opacity="0.3" filter="url(#ico)"/>
  <rect x="13" y="10" width="2" height="14" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="18" y="10" width="2" height="14" rx="1" fill="#fff" opacity="0.3"/>
  <rect x="23" y="10" width="2" height="14" rx="1" fill="#fff" opacity="0.3"/>
  <!-- Fader knobs at different heights -->
  <rect x="7" y="14" width="4" height="3" rx="1" fill="#fff" filter="url(#ico)"/>
  <rect x="12" y="18" width="4" height="3" rx="1" fill="#fff" filter="url(#ico)"/>
  <rect x="17" y="12" width="4" height="3" rx="1" fill="#fff" filter="url(#ico)"/>
  <rect x="22" y="16" width="4" height="3" rx="1" fill="#fff" filter="url(#ico)"/>
</svg>
