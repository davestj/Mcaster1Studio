<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="55%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#854d0e" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Document/notepad with lines -->
  <g filter="url(#ico)">
    <rect x="9" y="8.5" width="14" height="17" rx="1.5" fill="none" stroke="#fff" stroke-width="1.4"/>
    <!-- Dog-ear fold -->
    <path d="M19 8.5 L23 8.5 L23 12.5 L19 8.5 Z" fill="#fff" opacity="0.4"/>
    <line x1="12" y1="13" x2="20" y2="13" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="16" x2="20" y2="16" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="19" x2="17" y2="19" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
