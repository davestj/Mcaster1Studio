<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="55%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#065f46" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Megaphone/bullhorn -->
  <path d="M10,13 L14,11 L14,21 L10,19 Z" fill="#fff" filter="url(#ico)"/>
  <path d="M14,11 L22,8 L22,24 L14,21 Z" fill="#fff" opacity="0.85"/>
  <rect x="7" y="13" width="3" height="6" rx="1" fill="#fff"/>
  <!-- Sound waves -->
  <path d="M23,12 Q25,16 23,20" fill="none" stroke="#fff" stroke-width="1.0" opacity="0.7"/>
  <path d="M25,10 Q28,16 25,22" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
</svg>
