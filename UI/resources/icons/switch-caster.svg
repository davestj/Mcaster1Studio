<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#4c1d95" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Two preview monitors -->
  <rect x="6" y="9" width="9" height="6" rx="1" fill="none" stroke="#fff" stroke-width="1" opacity="0.7"/>
  <rect x="17" y="9" width="9" height="6" rx="1" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <!-- "LIVE" indicator on right monitor -->
  <rect x="20" y="10" width="4" height="2" rx="0.5" fill="#ef4444"/>
  <!-- Arrow: preview → program -->
  <polyline points="13,18 16,20 13,22" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" filter="url(#ico)"/>
  <!-- Source buttons row -->
  <rect x="7"  y="24" width="4" height="3" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="12" y="24" width="4" height="3" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="17" y="24" width="4" height="3" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="22" y="24" width="4" height="3" rx="1" fill="#fff" opacity="0.5"/>
</svg>
