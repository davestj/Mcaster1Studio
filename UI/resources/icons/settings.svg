<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.12"/></filter>
  </defs>
  <rect x="1" y="1" width="22" height="22" rx="4" fill="#e8e4de" stroke="#c0b8ae" stroke-width="0.5" filter="url(#sh)"/>
  <!-- Gear glyph -->
  <circle cx="12" cy="12" r="2.5" fill="none" stroke="#1e3a5f" stroke-width="1.4"/>
  <circle cx="12" cy="12" r="1" fill="#1e3a5f"/>
  <!-- 8 gear teeth -->
  <line x1="12" y1="6"    x2="12" y2="7.7"   stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="16.3" x2="12" y2="18"    stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6"  y1="12"   x2="7.7" y2="12"   stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16.3" y1="12" x2="18" y2="12"    stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7.8"  y1="7.8"  x2="9"   y2="9"    stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="15"   y1="15"   x2="16.2" y2="16.2" stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16.2" y1="7.8"  x2="15"   y2="9"    stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="9"    y1="15"   x2="7.8"  y2="16.2" stroke="#1e3a5f" stroke-width="1.4" stroke-linecap="round"/>
</svg>
