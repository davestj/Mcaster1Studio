<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="55%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#7f1d1d" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Microphone body -->
  <rect x="13" y="8" width="6" height="9" rx="3" fill="#fff" filter="url(#ico)"/>
  <!-- Mic stand arc -->
  <path d="M11,15 Q11,21 16,21 Q21,21 21,15" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Mic stand -->
  <line x1="16" y1="21" x2="16" y2="24" stroke="#fff" stroke-width="1.3"/>
  <!-- Text lines (transcript) -->
  <line x1="9" y1="26" x2="15" y2="26" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="26" x2="23" y2="26" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
