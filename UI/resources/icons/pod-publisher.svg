<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="55%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#064e3b" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Upload arrow with cloud -->
  <g filter="url(#ico)">
    <!-- Cloud shape -->
    <path d="M10 14 Q10 10 13.5 10 Q14.5 8 17 8.5 Q19.5 7 21 9 Q23.5 9.5 23 12 Q24.5 13 23 14.5 L10 14.5 Q8.5 14 10 14 Z"
          fill="#fff"/>
    <!-- Upload arrow -->
    <line x1="16" y1="24" x2="16" y2="17" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <polyline points="12.5,20.5 16,17 19.5,20.5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
