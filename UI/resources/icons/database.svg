<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#4c1d95" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Database cylinder -->
  <ellipse cx="16" cy="10" rx="8" ry="3" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <path d="M8,10 L8,22 C8,22 8,25 16,25 C24,25 24,22 24,22 L24,10"
        fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <ellipse cx="16" cy="22" rx="8" ry="3" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- Middle ring -->
  <path d="M8,16 C8,16 8,19 16,19 C24,19 24,16 24,16"
        fill="none" stroke="#fff" stroke-width="0.8" opacity="0.7"/>
</svg>
