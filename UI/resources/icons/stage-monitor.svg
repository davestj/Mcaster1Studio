<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#155e75" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Monitor screen -->
  <rect x="6" y="7" width="20" height="13" rx="1.5" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <!-- Split screen indicator (current | next) -->
  <line x1="16" y1="9" x2="16" y2="18" stroke="#fff" stroke-width="0.8" stroke-dasharray="1.5,1"/>
  <!-- Left side: current content (text lines) -->
  <line x1="8" y1="10" x2="14" y2="10" stroke="#fff" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="8" y1="12.5" x2="14" y2="12.5" stroke="#fff" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="8" y1="15" x2="12" y2="15" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
  <!-- Right side: next preview -->
  <line x1="18" y1="10" x2="24" y2="10" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="18" y1="12.5" x2="24" y2="12.5" stroke="#fff" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Monitor stand -->
  <line x1="16" y1="20" x2="16" y2="23" stroke="#fff" stroke-width="1.2"/>
  <line x1="12" y1="23" x2="20" y2="23" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Stage indicator dot -->
  <circle cx="16" cy="25.5" r="1.2" fill="#fff" opacity="0.8"/>
</svg>
