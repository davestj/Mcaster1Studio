<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#92400e" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Clock circle -->
  <circle cx="16" cy="15" r="8" fill="none" stroke="#fff" stroke-width="1.3" filter="url(#ico)"/>
  <!-- Clock hands -->
  <line x1="16" y1="15" x2="16" y2="10" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="15" x2="20" y2="15" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="15" r="1" fill="#fff"/>
  <!-- Timer ticks at 12,3,6,9 -->
  <line x1="16" y1="7.5" x2="16" y2="8.5" stroke="#fff" stroke-width="0.8"/>
  <line x1="23.5" y1="15" x2="22.5" y2="15" stroke="#fff" stroke-width="0.8"/>
  <line x1="16" y1="22.5" x2="16" y2="21.5" stroke="#fff" stroke-width="0.8"/>
  <line x1="8.5" y1="15" x2="9.5" y2="15" stroke="#fff" stroke-width="0.8"/>
  <!-- Countdown arrow below -->
  <polyline points="12,26 16,24 20,26" fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
