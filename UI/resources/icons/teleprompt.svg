<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.30"/></filter>
    <filter id="ico"><feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-opacity="0.35"/></filter>
  </defs>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5.5"
        fill="url(#bg)" stroke="#92400e" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="2.5" y="2.5" width="27" height="14" rx="4.5" fill="url(#shine)"/>
  <!-- Scroll/document with text lines -->
  <rect x="9" y="6" width="14" height="20" rx="1.5" fill="none" stroke="#fff" stroke-width="1.2" filter="url(#ico)"/>
  <!-- Text lines -->
  <line x1="11" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.5"/>
  <line x1="11" y1="13" x2="21" y2="13" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
  <!-- Highlighted current line -->
  <rect x="10.5" y="15" width="11" height="2.5" rx="0.5" fill="rgba(255,255,255,0.3)"/>
  <line x1="11" y1="16.25" x2="21" y2="16.25" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="11" y1="19" x2="21" y2="19" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.7"/>
  <line x1="11" y1="22" x2="21" y2="22" stroke="#fff" stroke-width="1.0" stroke-linecap="round" opacity="0.5"/>
  <!-- Scroll arrow -->
  <polyline points="16,25 14,23 18,23" fill="#fff" stroke="none" filter="url(#ico)"/>
</svg>
