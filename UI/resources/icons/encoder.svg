<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-opacity="0.12"/></filter>
  </defs>
  <rect x="1" y="1" width="22" height="22" rx="4" fill="#e8e4de" stroke="#c0b8ae" stroke-width="0.5" filter="url(#sh)"/>
  <!-- Radio tower / broadcast antenna glyph -->
  <line x1="12" y1="18" x2="12" y2="11.5" stroke="#1c5caa" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="7.5" y1="18" x2="16.5" y2="18" stroke="#1c5caa" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Broadcast arcs -->
  <path d="M8.5,10.5 A4,4 0 0,1 15.5,10.5" fill="none" stroke="#1c5caa" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M6,8.5 A7,7 0 0,1 18,8.5" fill="none" stroke="#1c5caa" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M3.5,6.5 A9.5,9.5 0 0,1 20.5,6.5" fill="none" stroke="#1c5caa" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <!-- Signal dot (green) -->
  <circle cx="12" cy="11" r="1.3" fill="#22c55e"/>
</svg>
