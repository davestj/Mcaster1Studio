<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e4480"/>
      <stop offset="100%" stop-color="#060e20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <clipPath id="clip"><rect x="0" y="0" width="64" height="64" rx="13" ry="13"/></clipPath>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="13" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="12.5" fill="none"
        stroke="rgba(100,160,255,0.20)" stroke-width="1"/>
  <!-- Gloss -->
  <rect x="0" y="0" width="64" height="30" rx="13" fill="rgba(255,255,255,0.10)" clip-path="url(#clip)"/>
  <!-- Broadcast arcs -->
  <path d="M13,31 A20,20 0 0,1 51,31"
        fill="none" stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M18,28 A16,16 0 0,1 46,28"
        fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M22,26 A12,12 0 0,1 42,26"
        fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Antenna mast -->
  <line x1="32" y1="10" x2="32" y2="30"
        stroke="#7dd3fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="30" x2="36" y2="30"
        stroke="#7dd3fc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="30" x2="25" y2="36"
        stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="36" y1="30" x2="39" y2="36"
        stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round"/>
  <!-- On-air dot -->
  <circle cx="32" cy="8" r="3.5" fill="#22c55e"/>
  <circle cx="32" cy="8" r="1.8" fill="#bbf7d0"/>
  <!-- M lettermark -->
  <rect x="12" y="38" width="3.5" height="18" rx="1.2" fill="white"/>
  <rect x="34" y="38" width="3.5" height="18" rx="1.2" fill="white"/>
  <polygon points="12,38 15.5,38 26,50 22.5,50" fill="white"/>
  <polygon points="37.5,38 34,38 26,50 29.5,50" fill="white"/>
  <!-- Sep dot -->
  <circle cx="42" cy="47" r="1.8" fill="url(#gold)"/>
  <!-- 1 lettermark -->
  <rect x="45" y="38" width="3.5" height="18" rx="1.2" fill="url(#gold)"/>
  <polygon points="45,38 48.5,38 46,44 42.5,44" fill="url(#gold)"/>
  <rect x="41" y="53" width="11" height="3" rx="1.2" fill="url(#gold)"/>
</svg>
