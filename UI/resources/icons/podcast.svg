<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none">
  <!-- Microphone body -->
  <rect x="5.5" y="1" width="5" height="8" rx="2.5" fill="#96897c" stroke="#6b6560" stroke-width="0.5"/>
  <!-- Arc below mic -->
  <path d="M3 8c0 2.76 2.24 5 5 5s5-2.24 5-5" stroke="#1c5caa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Stand -->
  <line x1="8" y1="13" x2="8" y2="15" stroke="#1c5caa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="15" x2="11" y2="15" stroke="#1c5caa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Outer podcast wave arcs -->
  <path d="M1.5 8c0 3.59 2.91 6.5 6.5 6.5S14.5 11.59 14.5 8" stroke="#1c5caa" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-dasharray="1.5 1.5" opacity="0.5"/>
  <path d="M0 8c0 4.42 3.58 8 8 8s8-3.58 8-8" stroke="#1c5caa" stroke-width="0.6" fill="none" stroke-linecap="round" stroke-dasharray="1.5 1.5" opacity="0.3"/>
</svg>
