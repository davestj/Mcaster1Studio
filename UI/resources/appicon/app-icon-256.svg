<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- App background gradient: deep navy → midnight blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="55%"  stop-color="#0c1e42"/>
      <stop offset="100%" stop-color="#060e20"/>
    </linearGradient>
    <!-- Top-quarter gloss highlight -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Broadcast arc glow -->
    <filter id="arcglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dot glow -->
    <filter id="dotglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Sandy gold gradient for the "1" -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Cyan glyph gradient -->
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <!-- Clip to rounded square -->
    <clipPath id="clip">
      <rect x="0" y="0" width="256" height="256" rx="52" ry="52"/>
    </clipPath>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- Subtle border ring -->
  <rect x="1" y="1" width="254" height="254" rx="51" fill="none"
        stroke="rgba(100,160,255,0.18)" stroke-width="2"/>

  <!-- Top gloss -->
  <rect x="0" y="0" width="256" height="118" rx="52" fill="url(#gloss)" clip-path="url(#clip)"/>

  <!-- ── Broadcast signal arcs (center-top, radiating upward) ─────────────── -->
  <!-- Outermost arc — faintest -->
  <path d="M46,120 A90,90 0 0,1 210,120"
        fill="none" stroke="url(#cyan)" stroke-width="3.5"
        stroke-linecap="round" opacity="0.25" filter="url(#arcglow)"/>
  <!-- Middle arc -->
  <path d="M66,112 A70,70 0 0,1 190,112"
        fill="none" stroke="url(#cyan)" stroke-width="5"
        stroke-linecap="round" opacity="0.55" filter="url(#arcglow)"/>
  <!-- Inner arc — brightest -->
  <path d="M88,106 A50,50 0 0,1 168,106"
        fill="none" stroke="url(#cyan)" stroke-width="7"
        stroke-linecap="round" opacity="0.9" filter="url(#arcglow)"/>

  <!-- ── Antenna mast ──────────────────────────────────────────────────────── -->
  <!-- Mast body -->
  <line x1="128" y1="50" x2="128" y2="120"
        stroke="url(#cyan)" stroke-width="6" stroke-linecap="round"/>
  <!-- Mast base crossbar -->
  <line x1="114" y1="118" x2="142" y2="118"
        stroke="url(#cyan)" stroke-width="4" stroke-linecap="round"/>
  <!-- Mast legs -->
  <line x1="114" y1="118" x2="104" y2="134"
        stroke="url(#cyan)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="142" y1="118" x2="152" y2="134"
        stroke="url(#cyan)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── On-Air indicator dot ──────────────────────────────────────────────── -->
  <circle cx="128" cy="44" r="10" fill="#22c55e" filter="url(#dotglow)"/>
  <circle cx="128" cy="44" r="5.5" fill="#bbf7d0"/>

  <!-- ── "M·1" lettermark ─────────────────────────────────────────────────── -->
  <!-- White M — bold, broadcast character -->
  <!-- Left stroke of M -->
  <rect x="60" y="148" width="12" height="60" rx="4" fill="white"/>
  <!-- Right stroke of M -->
  <rect x="130" y="148" width="12" height="60" rx="4" fill="white"/>
  <!-- Left diagonal down from top-left -->
  <polygon points="60,148 72,148 101,185 89,185" fill="white"/>
  <!-- Right diagonal down from top-right (meeting at center valley) -->
  <polygon points="142,148 130,148 101,185 113,185" fill="white"/>

  <!-- Separator dot -->
  <circle cx="156" cy="178" r="5" fill="url(#gold)"/>

  <!-- Gold "1" — right of M -->
  <!-- Vertical bar of 1 -->
  <rect x="166" y="148" width="11" height="60" rx="3" fill="url(#gold)"/>
  <!-- Top serif of 1 -->
  <polygon points="166,148 177,148 168,162 157,162" fill="url(#gold)"/>
  <!-- Bottom base of 1 -->
  <rect x="155" y="200" width="34" height="8" rx="3" fill="url(#gold)"/>

  <!-- ── STUDIO label ───────────────────────────────────────────────────────── -->
  <text x="128" y="242"
        font-family="'Segoe UI','Arial Narrow','Arial',sans-serif"
        font-size="13" font-weight="700" letter-spacing="5"
        fill="rgba(180,210,255,0.55)" text-anchor="middle">STUDIO</text>

  <!-- ── Bottom studio console hint (decorative horizontal meter) ─────────── -->
  <rect x="56" y="228" width="20" height="3" rx="1.5" fill="#22c55e" opacity="0.7"/>
  <rect x="80" y="226" width="20" height="5" rx="1.5" fill="#0ea5e9" opacity="0.6"/>
  <rect x="104" y="224" width="20" height="7" rx="1.5" fill="#0ea5e9" opacity="0.5"/>
  <rect x="156" y="224" width="20" height="7" rx="1.5" fill="#0ea5e9" opacity="0.5"/>
  <rect x="180" y="226" width="20" height="5" rx="1.5" fill="#0ea5e9" opacity="0.6"/>
</svg>
