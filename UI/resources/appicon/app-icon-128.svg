<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="55%"  stop-color="#0c1e42"/>
      <stop offset="100%" stop-color="#060e20"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect x="0" y="0" width="128" height="128" rx="26" ry="26"/></clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="25.5" fill="none"
        stroke="rgba(100,160,255,0.18)" stroke-width="1"/>
  <!-- Gloss -->
  <rect x="0" y="0" width="128" height="58" rx="26" fill="url(#gloss)" clip-path="url(#clip)"/>

  <!-- Broadcast arcs -->
  <path d="M27,60 A40,40 0 0,1 101,60"
        fill="none" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M35,56 A33,33 0 0,1 93,56"
        fill="none" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M44,52 A24,24 0 0,1 84,52"
        fill="none" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" opacity="0.9"
        filter="url(#glow)"/>

  <!-- Antenna mast -->
  <line x1="64" y1="22" x2="64" y2="60"
        stroke="#7dd3fc" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="57" y1="59" x2="71" y2="59"
        stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="57" y1="59" x2="52" y2="68"
        stroke="#7dd3fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="71" y1="59" x2="76" y2="68"
        stroke="#7dd3fc" stroke-width="2" stroke-linecap="round"/>

  <!-- On-air dot -->
  <circle cx="64" cy="18" r="5.5" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="64" cy="18" r="3"   fill="#bbf7d0"/>

  <!-- M lettermark -->
  <rect x="28" y="74" width="6" height="32" rx="2" fill="white"/>
  <rect x="64" y="74" width="6" height="32" rx="2" fill="white"/>
  <polygon points="28,74 34,74 51,94 45,94" fill="white"/>
  <polygon points="70,74 64,74 51,94 57,94" fill="white"/>

  <!-- Separator dot -->
  <circle cx="78" cy="90" r="3" fill="url(#gold)"/>

  <!-- 1 lettermark -->
  <rect x="83" y="74" width="6" height="32" rx="2" fill="url(#gold)"/>
  <polygon points="83,74 89,74 84,83 78,83" fill="url(#gold)"/>
  <rect x="77" y="100" width="18" height="5" rx="2" fill="url(#gold)"/>

  <!-- Studio bar indicators (tiny) -->
  <rect x="27" y="113" width="10" height="2" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="40" y="112" width="10" height="3" rx="1" fill="#0ea5e9" opacity="0.6"/>
  <rect x="53" y="111" width="10" height="4" rx="1" fill="#0ea5e9" opacity="0.5"/>
  <rect x="78" y="111" width="10" height="4" rx="1" fill="#0ea5e9" opacity="0.5"/>
  <rect x="91" y="112" width="10" height="3" rx="1" fill="#0ea5e9" opacity="0.6"/>
</svg>
