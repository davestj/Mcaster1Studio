<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="55%"  stop-color="#0c1e42"/>
      <stop offset="100%" stop-color="#060e20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <clipPath id="clip"><rect x="0" y="0" width="48" height="48" rx="10" ry="10"/></clipPath>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="47" height="47" rx="9.5" fill="none"
        stroke="rgba(100,160,255,0.2)" stroke-width="1"/>
  <!-- Top gloss -->
  <rect x="0" y="0" width="48" height="22" rx="10" fill="rgba(255,255,255,0.10)" clip-path="url(#clip)"/>

  <!-- Broadcast arcs -->
  <path d="M10,24 A15,15 0 0,1 38,24"
        fill="none" stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <path d="M14,21 A12,12 0 0,1 34,21"
        fill="none" stroke="#7dd3fc" stroke-width="1.8" stroke-linecap="round" opacity="0.65"/>
  <path d="M17,19 A9,9 0 0,1 31,19"
        fill="none" stroke="#7dd3fc" stroke-width="2.2" stroke-linecap="round" opacity="0.95"/>

  <!-- Antenna mast -->
  <line x1="24" y1="7"  x2="24" y2="23"
        stroke="#7dd3fc" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="23" x2="27" y2="23"
        stroke="#7dd3fc" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="21" y1="23" x2="18" y2="28"
        stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>
  <line x1="27" y1="23" x2="30" y2="28"
        stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>

  <!-- On-air dot -->
  <circle cx="24" cy="5.5" r="3" fill="#22c55e"/>
  <circle cx="24" cy="5.5" r="1.5" fill="#bbf7d0"/>

  <!-- M glyph -->
  <rect x="9"  y="30" width="2.8" height="13" rx="1" fill="white"/>
  <rect x="26" y="30" width="2.8" height="13" rx="1" fill="white"/>
  <polygon points="9,30 11.8,30 20,39 17.2,39" fill="white"/>
  <polygon points="28.8,30 26,30 20,39 22.8,39" fill="white"/>

  <!-- Sep dot -->
  <circle cx="33" cy="36.5" r="1.5" fill="url(#gold)"/>

  <!-- 1 glyph -->
  <rect x="35.5" y="30" width="2.8" height="13" rx="1" fill="url(#gold)"/>
  <polygon points="35.5,30 38.3,30 36.5,35 33.7,35" fill="url(#gold)"/>
  <rect x="32.5" y="41" width="9" height="2.5" rx="1" fill="url(#gold)"/>
</svg>
