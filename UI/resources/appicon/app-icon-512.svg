<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="40%"  stop-color="#0c1e42"/>
      <stop offset="100%" stop-color="#060e20"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="50%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#bae6fd"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect x="0" y="0" width="512" height="512" rx="104" ry="104"/></clipPath>
  </defs>

  <!-- ── Background ──────────────────────────────────────────────────────── -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- Inner subtle border ring -->
  <rect x="2" y="2" width="508" height="508" rx="102" fill="none"
        stroke="rgba(120,180,255,0.20)" stroke-width="3"/>

  <!-- Top gloss -->
  <rect x="0" y="0" width="512" height="240" rx="104" fill="url(#gloss)" clip-path="url(#clip)"/>

  <!-- Lower inner vignette panel (studio console feel) -->
  <rect x="0" y="360" width="512" height="152" rx="0" fill="rgba(0,0,0,0.25)" clip-path="url(#clip)"/>

  <!-- ── Broadcast signal arcs ──────────────────────────────────────────── -->
  <!-- Outermost -->
  <path d="M80,240 A200,200 0 0,1 432,240"
        fill="none" stroke="url(#cyan)" stroke-width="5"
        stroke-linecap="round" opacity="0.18" filter="url(#glow)"/>
  <!-- Middle-outer -->
  <path d="M110,228 A165,165 0 0,1 402,228"
        fill="none" stroke="url(#cyan)" stroke-width="7"
        stroke-linecap="round" opacity="0.38" filter="url(#glow)"/>
  <!-- Middle -->
  <path d="M142,218 A130,130 0 0,1 370,218"
        fill="none" stroke="url(#cyan)" stroke-width="9"
        stroke-linecap="round" opacity="0.60" filter="url(#glow)"/>
  <!-- Inner -->
  <path d="M174,210 A96,96 0 0,1 338,210"
        fill="none" stroke="url(#cyan)" stroke-width="12"
        stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>

  <!-- ── Antenna mast ────────────────────────────────────────────────────── -->
  <line x1="256" y1="88"  x2="256" y2="244"
        stroke="url(#cyan)" stroke-width="11" stroke-linecap="round"/>
  <!-- Mast crossbar -->
  <line x1="228" y1="238" x2="284" y2="238"
        stroke="url(#cyan)" stroke-width="7" stroke-linecap="round"/>
  <!-- Mast legs -->
  <line x1="228" y1="238" x2="210" y2="272"
        stroke="url(#cyan)" stroke-width="6" stroke-linecap="round"/>
  <line x1="284" y1="238" x2="302" y2="272"
        stroke="url(#cyan)" stroke-width="6" stroke-linecap="round"/>
  <!-- Leg feet -->
  <line x1="198" y1="272" x2="222" y2="272"
        stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
  <line x1="290" y1="272" x2="314" y2="272"
        stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>

  <!-- ── On-Air indicator ──────────────────────────────────────────────── -->
  <circle cx="256" cy="74" r="22" fill="url(#green)" filter="url(#dotglow)"/>
  <circle cx="256" cy="74" r="13" fill="white"/>
  <circle cx="256" cy="74" r="7"  fill="#22c55e"/>

  <!-- ── M lettermark ──────────────────────────────────────────────────── -->
  <!-- Left stroke -->
  <rect x="110" y="300" width="24" height="120" rx="8" fill="white"/>
  <!-- Right stroke -->
  <rect x="262" y="300" width="24" height="120" rx="8" fill="white"/>
  <!-- Left diagonal peak -->
  <polygon points="110,300 134,300 198,376 174,376" fill="white"/>
  <!-- Right diagonal peak -->
  <polygon points="286,300 262,300 198,376 222,376" fill="white"/>

  <!-- Separator · -->
  <circle cx="313" cy="360" r="9" fill="url(#gold)"/>

  <!-- ── 1 lettermark ──────────────────────────────────────────────────── -->
  <!-- Main stroke -->
  <rect x="326" y="300" width="24" height="120" rx="8" fill="url(#gold)"/>
  <!-- Top serif lead -->
  <polygon points="326,300 350,300 336,325 312,325" fill="url(#gold)"/>
  <!-- Base serif -->
  <rect x="308" y="408" width="68" height="18" rx="6" fill="url(#gold)"/>

  <!-- ── STUDIO label ───────────────────────────────────────────────────── -->
  <text x="256" y="482"
        font-family="'Segoe UI','Arial Narrow','Arial',sans-serif"
        font-size="26" font-weight="700" letter-spacing="10"
        fill="rgba(160,200,255,0.50)" text-anchor="middle">STUDIO</text>

  <!-- ── Studio console level meters (decorative) ─────────────────────── -->
  <rect x="95"  y="456" width="38" height="5" rx="2.5" fill="#22c55e" opacity="0.7"/>
  <rect x="142" y="453" width="38" height="8" rx="2.5" fill="#0ea5e9" opacity="0.6"/>
  <rect x="189" y="450" width="38" height="11" rx="2.5" fill="#0ea5e9" opacity="0.5"/>
  <rect x="285" y="450" width="38" height="11" rx="2.5" fill="#0ea5e9" opacity="0.5"/>
  <rect x="332" y="453" width="38" height="8" rx="2.5" fill="#0ea5e9" opacity="0.6"/>
  <rect x="379" y="456" width="38" height="5" rx="2.5" fill="#22c55e" opacity="0.7"/>

  <!-- ── Vinyl record silhouette (broadcast music element) ──────────────── -->
  <!-- Decorative small record bottom left -->
  <circle cx="86" cy="320" r="36" fill="#111a2e" opacity="0.8"/>
  <circle cx="86" cy="320" r="28" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="86" cy="320" r="20" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="86" cy="320" r="12" fill="#0c1a2e" opacity="0.9"/>
  <circle cx="86" cy="320" r="5"  fill="#f0e8d0"/>
  <circle cx="86" cy="320" r="2"  fill="#1a1814"/>

  <!-- Decorative small record bottom right -->
  <circle cx="426" cy="320" r="36" fill="#111a2e" opacity="0.8"/>
  <circle cx="426" cy="320" r="28" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="426" cy="320" r="20" fill="none" stroke="#1e3a5f" stroke-width="1"/>
  <circle cx="426" cy="320" r="12" fill="#0c1a2e" opacity="0.9"/>
  <circle cx="426" cy="320" r="5"  fill="#f0e8d0"/>
  <circle cx="426" cy="320" r="2"  fill="#1a1814"/>
</svg>
